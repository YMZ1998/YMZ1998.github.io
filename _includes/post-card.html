<article class="post-card card{% if include.featured %} is-featured{% endif %}" data-post-card data-tag="{{ include.post.topic | escape }}">
  {% if include.post.topic %}
  <span class="post-tag">{{ include.post.topic }}</span>
  {% endif %}
  <h3>{{ include.post.title }}</h3>
  {% if include.post.summary %}
  <p>{{ include.post.summary }}</p>
  {% endif %}
  <div class="post-meta">
    <span>{{ include.post.date | date: "%Y-%m-%d" }}</span>
    {% if include.post.read_time %}
    <span>{{ include.post.read_time }}</span>
    {% endif %}
  </div>
  <a class="text-link" href="{{ include.post.url | relative_url }}">阅读全文 →</a>
</article>
