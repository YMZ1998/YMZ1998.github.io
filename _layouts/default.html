<!DOCTYPE html>
<html lang="{{ site.lang | default: 'zh-CN' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta name="theme-color" content="#0f172a">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">
  <link rel="stylesheet" href="{{ '/styles.css' | relative_url }}">
  <script type="module" src="{{ '/assets/js/main.js' | relative_url }}"></script>
</head>
<body id="{{ page.body_id | default: 'top' }}" class="{{ page.body_class }}" data-page="{{ page.page_id | default: 'default' }}">
  <div class="scroll-progress" id="scroll-progress" aria-hidden="true"></div>

  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="{{ '/' | relative_url }}" aria-label="返回首页">
        <span class="brand-mark">YMZ</span>
        <span class="brand-text">Blog</span>
      </a>

      <div class="site-actions">
        {% include site-nav.html %}

        <button class="theme-toggle" type="button" data-theme-toggle aria-label="切换主题">
          <span class="theme-toggle-icon">🌙</span>
          <span class="theme-toggle-text">深色</span>
        </button>

        <button class="nav-toggle" type="button" data-nav-toggle aria-expanded="false" aria-label="切换导航">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </div>
  </header>

  {{ content }}

  <div class="lightbox" data-lightbox hidden>
    <button class="lightbox-backdrop" type="button" data-lightbox-close aria-label="关闭预览"></button>
    <div class="lightbox-dialog" role="dialog" aria-modal="true" aria-label="图片预览">
      <div class="lightbox-toolbar">
        <p class="lightbox-title" data-lightbox-title></p>
        <div class="lightbox-actions">
          <a class="button ghost button-inline" data-lightbox-download target="_blank" rel="noreferrer">查看原图 ↗</a>
          <button class="button ghost button-inline" type="button" data-lightbox-close>关闭</button>
        </div>
      </div>
      <div class="lightbox-media">
        <img data-lightbox-image alt="">
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© <span data-year></span> YMZ Blog</p>
      <a href="#top">返回顶部 →</a>
    </div>
  </footer>
</body>
</html>
