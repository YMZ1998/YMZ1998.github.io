title: YMZ Blog
description: 整理医学图像、工程和摄影内容的个人站点。
lang: zh-CN
timezone: Asia/Shanghai
future: true
markdown: kramdown
kramdown:
  input: GFM
permalink: /posts/:title/
collections:
  projects:
    output: true
    permalink: /projects/:name/
  photography:
    output: true
    permalink: /photography/:name/
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      page_id: post
  - scope:
      path: ""
      type: projects
    values:
      layout: project
      page_id: project
  - scope:
      path: ""
      type: photography
    values:
      layout: photo
      page_id: photo
author:
  name: YMZ
  role: 医学图像 / 工程 / 摄影
  bio: 这里主要放我在做的医学图像、工程项目和摄影记录。
  location: China
  github: https://github.com/YMZ1998
  intro: 这个站点用来整理项目、文章和照片，方便以后回头看。
focus_areas:
  - title: CBCT 与 pseudo CT
    description: 记录数据、训练、重建和结果。
  - title: 工程结构与工具链
    description: 记录项目结构、脚本和工具使用。
  - title: 摄影与记录
    description: 放一些照片，也记一点拍摄想法。
