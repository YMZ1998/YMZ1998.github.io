- title: CBCT-to-CT
  description: 这是目前投入比较多的一个方向，主要围绕伪 CT 生成，包含数据处理、训练和结果验证这些实际工作。
  url: https://github.com/YMZ1998/CBCT-to-CT
- title: CBCT-to-CT-CycleGAN
  description: 这是用 CycleGAN 做 CBCT 到 CT 图像翻译时留下来的实验线，更多是在验证方法和训练思路。
  url: https://github.com/YMZ1998/CBCT-to-CT-CycleGAN
- title: CBCT-Reconstruction
  description: 这里更偏工具链和流程，主要是把 CBCT 重建过程中会反复用到的东西收拢起来。
  url: https://github.com/YMZ1998/CBCT-Reconstruction
- title: cmake-project-template
  description: 这是自己平时搭 C++ / CMake 项目时慢慢整理出来的模板，重点是少走重复配置的弯路。
  url: https://github.com/YMZ1998/cmake-project-template
- title: model-viewer
  description: 这个项目主要是为了解决“结果怎么更直观地看”这个问题，所以更关注展示和交互本身。
  url: https://github.com/YMZ1998/model-viewer
