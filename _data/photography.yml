  description: 平时在路上看到有意思的光线、站位或者人物关系，就会顺手按下来，很多画面其实都很日常。

- category: 自然光影
  cover_title: Quiet Light
  image: /assets/photography/nature-light.svg
  alt: 自然光影摄影作品
  title: 自然光影
  tags:
    - 逆光
    - 层次
  description: 这部分更多是在拍自然光本身，尤其是清晨和傍晚那种不太张扬、但层次很舒服的光线。

- category: 旅行记录
  cover_title: On The Road
  image: /assets/photography/travel-road.svg
  alt: 旅行记录摄影作品
  title: 旅途片段
  tags:
    - 旅拍
    - 人文
  description: 旅行里不会刻意只拍景点，更多是把沿途遇到的站台、街道、天气和节奏一起记下来。

- category: 黑白系列
  cover_title: Contrast
  image: /assets/photography/mono-contrast.svg
  alt: 黑白摄影作品
  title: 黑白街头
  tags:
    - 黑白
    - 结构
  description: 有些画面去掉颜色以后反而更干净，所以这一组更关注线条、反光和结构本身。

- category: 环境人像
  cover_title: Soft Scene
  image: /assets/photography/portrait-scene.svg
  alt: 环境人像摄影作品
  title: 环境人像
  tags:
    - 人像
    - 环境
  description: 我更喜欢把人物放进具体环境里拍，这样照片里不只有人，也会保留当时场景的情绪。
